version: '3.8'

services:
  nginx:
    image: nginx:1.24-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./admin/dist:/usr/share/nginx/html/admin:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always
    networks:
      - attendance-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql://attendance_user:attendance_pass@mysql:3306/attendance_db?schema=public
      REDIS_URL: redis://redis:6379
      DINGTALK_APP_KEY: ${DINGTALK_APP_KEY}
      DINGTALK_APP_SECRET: ${DINGTALK_APP_SECRET}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      PORT: 3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - attendance-network

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: attendance_user
      MYSQL_PASSWORD: attendance_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - attendance-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always
    networks:
      - attendance-network

networks:
  attendance-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: